questions:
  - id: q_main_complaint
    text: What is your main problem today?
    type: single_choice
    options:
      - {value: abdominal_pain, label: Abdominal Pain}
      - {value: bloating, label: Bloating}
      - {value: heartburn, label: Heartburn}

  - id: q_location
    text: Where is the pain located?
    type: single_choice
    options:
      - {value: ruq, label: Right Upper Abdomen}
      - {value: epigastric, label: Upper Middle Abdomen}
      - {value: rlq, label: Right Lower Abdomen}
      - {value: diffuse, label: Entire Abdomen}

  - id: q_fatty_food
    text: Does the pain worsen after fatty meals?
    type: yes_no

  - id: q_heartburn
    text: Do you experience burning behind the chest?
    type: yes_no

  - id: q_jaundice
    text: Have you noticed yellowing of the eyes or skin?
    type: yes_no

  - id: q_fever
    text: Do you have fever?
    type: yes_no

  - id: q_weight_loss
    text: Have you lost weight unintentionally?
    type: yes_no

  - id: q_black_stool
    text: Have you passed black stools?
    type: yes_no

  - id: q_diarrhea
    text: Do you have diarrhea?
    type: yes_no

  - id: q_constipation
    text: Do you have constipation?
    type: yes_no
