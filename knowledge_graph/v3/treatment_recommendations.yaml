# Per-diagnosis treatment suggestions (suggestion-panel content). DRAFT for review —
# clinician decides; not a prescribing protocol.
treatment_recommendations:
  biliary_colic:
    - Analgesia
    - Low-fat diet advice
    - Elective cholecystectomy referral
  acute_cholecystitis:
    - Admit; IV fluids
    - IV antibiotics
    - Surgical evaluation for cholecystectomy
  acute_pancreatitis:
    - Admit; IV fluids
    - Analgesia and antiemetics
    - Nil by mouth initially
  peptic_ulcer_disease:
    - Proton pump inhibitor
    - H. pylori eradication if positive
    - Stop NSAIDs
  gerd:
    - Lifestyle and dietary modification
    - Proton pump inhibitor trial
  appendicitis:
    - Surgical referral for appendicectomy
    - IV fluids and analgesia
  functional_dyspepsia:
    - Reassurance and lifestyle advice
    - Trial of PPI or prokinetic
  choledocholithiasis:
    - Referral for ERCP
    - Analgesia
    - Antibiotics if cholangitis
  viral_hepatitis:
    - Supportive care
    - Avoid hepatotoxins / alcohol
    - Notify and follow up serology
  pancreatic_head_malignancy:
    - Urgent oncology / HPB referral
    - Staging and MDT discussion
  alcoholic_hepatitis:
    - Alcohol cessation and support
    - Nutritional support
    - Specialist hepatology referral
  acute_gastroenteritis:
    - Oral rehydration
    - Safety-net advice
  irritable_bowel_syndrome:
    - Dietary modification (e.g. low-FODMAP)
    - Antispasmodics as needed
    - Reassurance
  inflammatory_bowel_disease:
    - Gastroenterology referral
    - Anti-inflammatory therapy per specialist
  colorectal_cancer:
    - Urgent colorectal referral
    - Staging and MDT discussion
  esophageal_varices:
    - Resuscitate; urgent endoscopy
    - Vasoactive drug and antibiotics
    - Band ligation
  hemorrhoids:
    - High-fibre diet and fluids
    - Topical treatment
    - Referral if persistent
