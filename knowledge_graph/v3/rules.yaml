# Weighted, signed feature -> diagnosis map (the core v3 change). Each finding nudges
# one or more diagnoses up (positive) or down (negative). `specificity` is an
# explainability label; discriminating features carry larger weights. DRAFT for
# physician review — weights are reference-informed starting points, not validated.
rules:
  # ---- Biliary colic ----
  - {id: r_bc_ruq, diagnosis: biliary_colic, condition: ap_ruq, weight: 12, specificity: moderate}
  - {id: r_bc_fatty, diagnosis: biliary_colic, condition: ap_fatty_trigger, weight: 15, specificity: high}
  - {id: r_bc_colicky, diagnosis: biliary_colic, condition: ap_colicky, weight: 10, specificity: moderate}
  - {id: r_bc_shoulder, diagnosis: biliary_colic, condition: ap_radiates_shoulder, weight: 8, specificity: moderate}

  # ---- Acute cholecystitis (biliary colic + inflammation) ----
  - {id: r_ac_ruq, diagnosis: acute_cholecystitis, condition: ap_ruq, weight: 10, specificity: moderate}
  - {id: r_ac_fatty, diagnosis: acute_cholecystitis, condition: ap_fatty_trigger, weight: 10, specificity: moderate}
  - {id: r_ac_fever, diagnosis: acute_cholecystitis, condition: ap_fever, weight: 18, specificity: high}
  - {id: r_ac_shoulder, diagnosis: acute_cholecystitis, condition: ap_radiates_shoulder, weight: 6, specificity: low}
  - {id: r_ac_vomiting, diagnosis: acute_cholecystitis, condition: ap_vomiting, weight: 5, specificity: low}

  # ---- Acute pancreatitis ----
  - {id: r_ap_epigastric, diagnosis: acute_pancreatitis, condition: ap_epigastric, weight: 8, specificity: low}
  - {id: r_ap_back, diagnosis: acute_pancreatitis, condition: ap_radiates_back, weight: 20, specificity: high}
  - {id: r_ap_boring, diagnosis: acute_pancreatitis, condition: ap_boring, weight: 10, specificity: moderate}
  - {id: r_ap_severe, diagnosis: acute_pancreatitis, condition: ap_severe, weight: 8, specificity: low}
  - {id: r_ap_vomiting, diagnosis: acute_pancreatitis, condition: ap_vomiting, weight: 6, specificity: low}
  - {id: r_ap_relieved, diagnosis: acute_pancreatitis, condition: ap_relieved_by_food, weight: 10, direction: negative}

  # ---- Peptic ulcer disease ----
  - {id: r_pud_epigastric, diagnosis: peptic_ulcer_disease, condition: ap_epigastric, weight: 10, specificity: moderate}
  - {id: r_pud_burning, diagnosis: peptic_ulcer_disease, condition: ap_burning, weight: 10, specificity: moderate}
  - {id: r_pud_relieved, diagnosis: peptic_ulcer_disease, condition: ap_relieved_by_food, weight: 15, specificity: high}
  - {id: r_pud_fasting, diagnosis: peptic_ulcer_disease, condition: ap_fasting, weight: 10, specificity: moderate}
  - {id: r_pud_aftermeals, diagnosis: peptic_ulcer_disease, condition: ap_after_meals, weight: 5, direction: negative}
  # PUD via dyspepsia presentation
  - {id: r_pud_dy_fasting, diagnosis: peptic_ulcer_disease, condition: dy_fasting, weight: 10, specificity: moderate}
  - {id: r_pud_dy_antacid, diagnosis: peptic_ulcer_disease, condition: dy_relieved_antacid, weight: 8, specificity: moderate}
  - {id: r_pud_dy_burning, diagnosis: peptic_ulcer_disease, condition: dy_burning, weight: 5, specificity: low}
  # PUD via GI bleeding presentation
  - {id: r_pud_gb_melena, diagnosis: peptic_ulcer_disease, condition: gb_melena, weight: 12, specificity: moderate}
  - {id: r_pud_gb_hematemesis, diagnosis: peptic_ulcer_disease, condition: gb_hematemesis, weight: 10, specificity: moderate}
