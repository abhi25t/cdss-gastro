# v4 — symptom-first questionnaire authored from the doctor's "history taking.docx"
# (2026-06-17). Structure follows her instruction: symptom-specific questions first,
# then ONE shared general block at the end; general items are NOT repeated inside a
# symptom, and a finding that is itself a chief complaint is not re-asked.
#
# DRAFT for physician review. Batch 1 = abdominal pain, heartburn, dysphagia + the
# shared general block. Remaining chief complaints to follow.
#
# Question types: single_choice, yes_no (rendered today) plus number, text,
# multi_choice (need patient-app renderers — Phase 2). `semiology`/`finding`/
# `summary_template`/option `hpi` drive the structured summary + draft HPI.
questions:
  - id: q_main_complaint
    text: What problems are you having today?
    type: multi_choice
    options:
      - {value: abdominal_pain, label: Abdominal / Tummy Pain}
      - {value: heartburn, label: Heartburn / Acid Reflux}
      - {value: dysphagia, label: Difficulty Swallowing}
      - {value: nausea_vomiting, label: Nausea / Vomiting}
      - {value: dyspepsia, label: Indigestion / Bloating}
      - {value: belching, label: Belching / Wind}
      - {value: diarrhoea, label: Loose Motions / Diarrhoea}
      - {value: constipation, label: Constipation}
      - {value: jaundice, label: Yellowing of Eyes or Skin}
      - {value: rectal_bleeding, label: Bleeding from the Back Passage}
      - {value: perianal, label: Pain / Lump Around the Back Passage}
      - {value: faecal_incontinence, label: Trouble Controlling the Bowels}
      - {value: bloating, label: Bloating / Swollen Tummy}
      - {value: ascites, label: Tummy Swelling with Fluid}
      - {value: weight_loss, label: Losing Weight}
      - {value: anaemia, label: Tiredness / Looking Pale}
      - {value: anorexia, label: Loss of Appetite}

  # ===================================================================
  # ABDOMINAL PAIN  (her "Pain" section)
  # ===================================================================
  - id: ap_duration
    text: How long have you had this pain?
    type: single_choice
    group: abdominal_pain
    semiology: onset
    summary_template: "present for {answer}"
    options:
      - {value: lt_1w, label: Less than a week, hpi: less than a week}
      - {value: 1_4w, label: 1–4 weeks, hpi: one to four weeks}
      - {value: 1_6m, label: 1–6 months, hpi: one to six months}
      - {value: gt_6m, label: More than 6 months, hpi: more than six months}
  - id: ap_site
    # region_select: tap the abdomen diagram (abdominopelvic_regions.svg). Several
    # regions may be chosen; "Entire tummy" is exclusive. Each option's `region` maps
    # to the SVG's data-region; `value` stays the clinical site the pain rules use.
    text: Where is the pain? Tap the area(s) on the picture.
    type: region_select
    group: abdominal_pain
    semiology: site
    summary_template: "in the {answer}"
    options:
      - {value: ruq, region: upper-right, label: Upper right, hpi: right upper quadrant}
      - {value: epigastric, region: upper-centre, label: Upper middle, hpi: epigastrium}
      - {value: luq, region: upper-left, label: Upper left, hpi: left upper quadrant}
      - {value: right_flank, region: middle-right, label: Right side, hpi: right flank}
      - {value: periumbilical, region: middle-centre, label: Around the navel, hpi: periumbilical region}
      - {value: left_flank, region: middle-left, label: Left side, hpi: left flank}
      - {value: rlq, region: lower-right, label: Lower right, hpi: right lower quadrant}
      - {value: hypogastric, region: lower-centre, label: Lower middle, hpi: suprapubic region}
      - {value: llq, region: lower-left, label: Lower left, hpi: left lower quadrant}
      - {value: diffuse, region: entire-abdomen, label: All over, hpi: diffuse abdomen}
  - id: ap_character
    text: What does the pain feel like?
    type: single_choice
    group: abdominal_pain
    semiology: character
    summary_template: "{answer} in character"
    options:
      - {value: burning, label: Burning, hpi: burning}
      - {value: cramping, label: Cramping / comes in waves, hpi: cramping}
      - {value: sharp, label: Sharp, hpi: sharp}
      - {value: pricking, label: Pricking, hpi: pricking}
      - {value: dull, label: Dull ache, hpi: dull}
  - id: ap_radiation
    text: Does the pain travel anywhere?
    type: single_choice
    group: abdominal_pain
    semiology: radiation
    summary_template: "radiating {answer}"
    options:
      - {value: back, label: To the back, hpi: to the back}
      - {value: right_shoulder, label: To the right shoulder, hpi: to the right shoulder}
      - {value: chest, label: To the chest, hpi: to the chest}
      - {value: none, label: Stays in one place, hpi: nowhere}
  - id: ap_pattern
    text: Is the pain there all the time, or does it come and go?
    type: single_choice
    group: abdominal_pain
    semiology: timing
    summary_template: "{answer}"
    options:
      - {value: constant, label: All the time, hpi: constant}
      - {value: intermittent, label: Comes and goes, hpi: intermittent}
  - id: ap_meals
    text: Does eating change the pain?
    type: single_choice
    group: abdominal_pain
    semiology: aggravating
    summary_template: "{answer}"
    options:
      - {value: better_eating, label: Better after eating, hpi: relieved by eating}
      - {value: worse_eating, label: Worse after eating, hpi: worse after eating}
      - {value: none, label: No change, hpi: unrelated to meals}
  - id: ap_night
    text: Does the pain wake you up at night?
    type: yes_no
    group: abdominal_pain
    finding: night-time pain

  # ===================================================================
  # HEARTBURN / ACID REFLUX
  # ===================================================================
  - id: hb_duration
    text: How long have you had heartburn?
    type: single_choice
    group: heartburn
    semiology: onset
    summary_template: "present for {answer}"
    options:
      - {value: lt_1w, label: Less than a week, hpi: less than a week}
      - {value: 1_4w, label: 1–4 weeks, hpi: one to four weeks}
      - {value: 1_6m, label: 1–6 months, hpi: one to six months}
      - {value: gt_6m, label: More than 6 months, hpi: more than six months}
  - id: hb_location
    text: Where do you feel the burning?
    type: single_choice
    group: heartburn
    semiology: site
    summary_template: "felt in the {answer}"
    options:
      - {value: chest, label: Chest, hpi: chest}
      - {value: throat, label: Throat, hpi: throat}
      - {value: both, label: Both chest and throat, hpi: chest and throat}
  - id: hb_rising
    text: Does the burning rise up toward your mouth?
    type: yes_no
    group: heartburn
    finding: rising retrosternal burning
  - id: hb_taste
    text: Do you get a sour or bitter taste in your mouth?
    type: yes_no
    group: heartburn
    finding: acid regurgitation
  - id: hb_timing
    text: When does it usually happen?
    type: single_choice
    group: heartburn
    semiology: timing
    summary_template: "worst {answer}"
    options:
      - {value: after_meals, label: After meals, hpi: after meals}
      - {value: at_night, label: At night, hpi: at night}
      - {value: both, label: Both, hpi: after meals and at night}
  - id: hb_triggers
    text: Which foods or drinks trigger it? (choose any)
    type: multi_choice
    group: heartburn
    semiology: aggravating
    summary_template: "triggered by {answer}"
    options:
      - {value: spicy, label: Spicy food}
      - {value: fatty, label: Fatty food}
      - {value: coffee, label: Coffee}
      - {value: alcohol, label: Alcohol}
      - {value: carbonated, label: Fizzy drinks}
      - {value: none, label: None in particular}
  - id: hb_frequency
    text: How often does it happen?
    type: single_choice
    group: heartburn
    semiology: severity
    summary_template: "occurring {answer}"
    options:
      - {value: daily, label: Daily, hpi: daily}
      - {value: weekly, label: Weekly, hpi: weekly}
      - {value: occasional, label: Now and then, hpi: occasionally}
  - id: hb_sleep
    text: Does it disturb your sleep?
    type: yes_no
    group: heartburn
    finding: sleep disturbance
  - id: hb_cough_voice
    text: Do you have a long-standing cough or hoarse voice?
    type: yes_no
    group: heartburn
    finding: chronic cough or hoarseness
  - id: hb_chest_pain
    text: Do you have any chest pain?
    type: yes_no
    group: heartburn
    finding: chest pain
  - id: hb_chest_pain_radiate
    text: Does the chest pain spread to your arm or jaw?
    type: yes_no
    group: heartburn
    finding: chest pain radiating to arm or jaw
  - id: hb_tried_meds
    text: Have you tried antacids or acid-reducing medicines?
    type: yes_no
    group: heartburn
    finding: prior antacid use
  - id: hb_meds_helped
    text: Did the medicines help?
    type: yes_no
    group: heartburn
    finding: response to acid suppression
  - id: hb_prior_scope
    text: Have you had an endoscopy or other tests before?
    type: yes_no
    group: heartburn
    finding: prior endoscopy

  # ===================================================================
  # DYSPHAGIA (difficulty swallowing)
  # ===================================================================
  - id: dys_duration
    text: How long have you had difficulty swallowing?
    type: single_choice
    group: dysphagia
    semiology: onset
    summary_template: "present for {answer}"
    options:
      - {value: lt_1w, label: Less than a week, hpi: less than a week}
      - {value: 1_4w, label: 1–4 weeks, hpi: one to four weeks}
      - {value: 1_6m, label: 1–6 months, hpi: one to six months}
      - {value: gt_6m, label: More than 6 months, hpi: more than six months}
  - id: dys_type
    text: When you swallow, does food get stuck, is it painful, or both?
    type: single_choice
    group: dysphagia
    semiology: character
    summary_template: "with {answer}"
    options:
      - {value: stuck, label: Food gets stuck, hpi: food sticking}
      - {value: painful, label: Painful to swallow, hpi: painful swallowing}
      - {value: both, label: Both, hpi: food sticking and painful swallowing}
  - id: dys_consistency
    text: Is it worse with solids, liquids, or both?
    type: single_choice
    group: dysphagia
    semiology: aggravating
    summary_template: "worse with {answer}"
    options:
      - {value: solids, label: Solids, hpi: solids}
      - {value: liquids, label: Liquids, hpi: liquids}
      - {value: both, label: Both, hpi: both solids and liquids}
  - id: dys_progression
    text: Is it getting worse, staying the same, or coming and going?
    type: single_choice
    group: dysphagia
    semiology: timing
    summary_template: "and is {answer}"
    options:
      - {value: worsening, label: Getting worse, hpi: progressive}
      - {value: stable, label: Staying the same, hpi: stable}
      - {value: intermittent, label: Comes and goes, hpi: intermittent}
  - id: dys_onset
    text: Did it start suddenly or gradually?
    type: single_choice
    group: dysphagia
    semiology: onset
    options:
      - {value: sudden, label: Suddenly, hpi: sudden}
      - {value: gradual, label: Gradually, hpi: gradual}
  - id: dys_regurg
    text: Do you bring up undigested food?
    type: yes_no
    group: dysphagia
    finding: regurgitation of undigested food
  - id: dys_reflux
    text: Do you also have heartburn or acid reflux?
    type: yes_no
    group: dysphagia
    finding: associated reflux
  - id: dys_aspiration
    text: Do you cough or choke when swallowing, especially liquids?
    type: yes_no
    group: dysphagia
    finding: coughing or choking on swallowing
  - id: dys_voice
    text: Has your voice changed or become hoarse?
    type: yes_no
    group: dysphagia
    finding: voice change
  - id: dys_radiation_hx
    text: Have you ever had radiation treatment to the chest or neck?
    type: yes_no
    group: dysphagia
    finding: prior chest/neck radiation
  - id: dys_corrosive
    text: Have you ever swallowed a corrosive substance or had a pill injury?
    type: yes_no
    group: dysphagia
    finding: corrosive or pill injury

  # ===================================================================
