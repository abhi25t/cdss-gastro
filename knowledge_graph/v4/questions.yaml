    type: yes_no
    group: jaundice
    finding: new drug/herbal exposure

  # ===================================================================
  # RECTAL BLEEDING (bleeding from the back passage)
  # ===================================================================
  - id: rb_duration
    text: How long have you noticed bleeding from the back passage?
    type: single_choice
    group: rectal_bleeding
    semiology: onset
    summary_template: "present for {answer}"
    options:
      - {value: lt_1w, label: Less than a week, hpi: less than a week}
      - {value: 1_4w, label: 1–4 weeks, hpi: one to four weeks}
      - {value: gt_1m, label: More than a month, hpi: more than a month}
  - id: rb_colour
    text: What colour is the blood?
    type: single_choice
    group: rectal_bleeding
    semiology: character
    summary_template: "{answer}"
    options:
      - {value: bright_red, label: Bright red, hpi: bright-red blood}
      - {value: dark, label: Dark / maroon, hpi: dark blood}
      - {value: mixed_in_stool, label: Mixed in the stool, hpi: blood mixed in the stool}
  - id: rb_relation
    text: When do you see the blood?
    type: single_choice
    group: rectal_bleeding
    semiology: timing
    summary_template: "{answer}"
    options:
      - {value: on_paper, label: Only on the toilet paper, hpi: on wiping}
      - {value: dripping, label: Dripping into the pan, hpi: dripping into the pan}
      - {value: mixed_with_stool, label: Mixed with the stool, hpi: mixed with stool}
      - {value: after_stool, label: After passing stool, hpi: after defecation}
  - id: rb_pain
    text: Is passing stool painful?
    type: yes_no
    group: rectal_bleeding
    finding: painful defecation
  - id: rb_lump
    text: Do you feel a lump coming out of the back passage?
    type: yes_no
    group: rectal_bleeding
    finding: prolapsing perianal lump
  - id: rb_bowel_change
    text: Has your bowel habit changed recently?
    type: yes_no
    group: rectal_bleeding
    finding: change in bowel habit
  - id: rb_mucus
    text: Is there mucus or slime with the blood?
    type: yes_no
    group: rectal_bleeding
    finding: mucus with blood

