    type: single_choice
    group: nausea_vomiting
    semiology: onset
    summary_template: "present for {answer}"
    options:
      - {value: lt_1w, label: Less than a week, hpi: less than a week}
      - {value: 1_4w, label: 1–4 weeks, hpi: one to four weeks}
      - {value: gt_1m, label: More than a month, hpi: more than a month}
  - id: nv_vomit_content
    text: What does the vomit look like?
    type: single_choice
    group: nausea_vomiting
    semiology: character
    summary_template: "vomiting {answer}"
    options:
      - {value: digested_food, label: Digested food, hpi: digested food}
      - {value: undigested_food, label: Undigested food, hpi: undigested food}
      - {value: bile, label: Yellow-green bile, hpi: bile}
      - {value: blood, label: Blood, hpi: blood}
      - {value: coffee_ground, label: Coffee-ground material, hpi: coffee-ground material}
      - {value: none, label: Only nausea, no vomit, hpi: nausea without vomiting}
  - id: nv_timing
    text: When does the vomiting happen?
    type: single_choice
    group: nausea_vomiting
    semiology: timing
    summary_template: "{answer}"
    options:
      - {value: soon_after_eating, label: Soon after eating, hpi: soon after eating}
      - {value: hours_after_eating, label: A few hours after eating, hpi: hours after eating}
      - {value: unrelated, label: Not related to food, hpi: unrelated to meals}
  - id: nv_abd_pain
    text: Do you also have tummy pain?
    type: yes_no
    group: nausea_vomiting
    finding: associated abdominal pain
  - id: nv_new_meds
    text: Have you started any new medicines recently?
    type: yes_no
    group: nausea_vomiting
    finding: recent new medication
  - id: nv_travel_diet
    text: Any recent travel or change in diet?
    type: yes_no
    group: nausea_vomiting
    finding: recent travel or diet change

  # ===================================================================
  # DYSPEPSIA / INDIGESTION / BLOATING
  # ===================================================================
  - id: dy_duration
    text: How long have you had indigestion or bloating?
    type: single_choice
    group: dyspepsia
    semiology: onset
    summary_template: "present for {answer}"
    options:
      - {value: lt_1m, label: Less than a month, hpi: less than a month}
      - {value: 1_6m, label: 1–6 months, hpi: one to six months}
      - {value: gt_6m, label: More than 6 months, hpi: more than six months}
  - id: dy_relation
    text: When does it come on?
    type: single_choice
    group: dyspepsia
    semiology: timing
    summary_template: "worst {answer}"
    options:
      - {value: during_meals, label: During meals, hpi: during meals}
      - {value: after_meals, label: After meals, hpi: after meals}
      - {value: empty_stomach, label: On an empty stomach, hpi: on an empty stomach}
  - id: dy_food_triggers
    text: Do certain foods trigger it? (choose any)
    type: multi_choice
    group: dyspepsia
    semiology: aggravating
    summary_template: "triggered by {answer}"
    options:
      - {value: wheat, label: Wheat}
      - {value: dairy, label: Dairy}
      - {value: fatty, label: Fatty food}
      - {value: none, label: None in particular}
  - id: dy_antacid_relief
    text: Is it relieved by antacids?
    type: yes_no
    group: dyspepsia
    finding: relief with antacids
  - id: dy_stool_relief
    text: Is it better after you pass stool?
    type: yes_no
    group: dyspepsia
    finding: relief on defecation
  - id: dy_bloating
    text: Do you feel bloated or full quickly?
    type: yes_no
    group: dyspepsia
    finding: bloating and early satiety

  # ===================================================================
  # BELCHING / WIND
  # ===================================================================
  - id: be_duration
    text: How long have you had excessive belching?
    type: single_choice
    group: belching
    semiology: onset
    summary_template: "present for {answer}"
    options:
      - {value: lt_1m, label: Less than a month, hpi: less than a month}
      - {value: gt_1m, label: More than a month, hpi: more than a month}
  - id: be_timing
    text: When do you belch most?
    type: single_choice
    group: belching
    semiology: timing
    summary_template: "{answer}"
    options:
      - {value: after_meals, label: After meals, hpi: after meals}
      - {value: anytime, label: Any time, hpi: throughout the day}
  - id: be_fizzy_fast_stress
    text: Is it worse with fizzy drinks, eating fast, or stress?
    type: yes_no
    group: belching
    finding: aerophagia triggers (fizzy drinks, fast eating, stress)
  - id: be_food_triggers
    text: Do particular foods bring it on?
    type: yes_no
    group: belching
    finding: food-triggered belching
  - id: be_flatulence
    text: Do you also have a lot of flatulence or tummy rumbling?
    type: yes_no
    group: belching
    finding: flatulence / borborygmi

  # ===================================================================
  # DIARRHOEA / LOOSE MOTIONS
  # ===================================================================
  - id: di_duration
    text: How long have you had loose motions?
    type: single_choice
    group: diarrhoea
    semiology: onset
    summary_template: "present for {answer}"
    options:
      - {value: lt_2w, label: Less than 2 weeks, hpi: an acute (<2 week)}
      - {value: 2_4w, label: 2–4 weeks, hpi: a 2–4 week}
      - {value: gt_4w, label: More than 4 weeks, hpi: a chronic (>4 week)}
  - id: di_frequency
    text: How many times a day?
    type: number
    group: diarrhoea
    semiology: frequency
    summary_template: "{answer} times a day"
  - id: di_consistency
    text: What are the stools like?
    type: single_choice
    group: diarrhoea
    semiology: character
    summary_template: "{answer} in consistency"
    options:
      - {value: mushy, label: Mushy, hpi: mushy}
      - {value: watery, label: Watery, hpi: watery}
      - {value: liquid, label: Completely liquid, hpi: liquid}
  - id: di_blood
    text: Is there blood in the stool?
    type: yes_no
    group: diarrhoea
    finding: blood in the stool
  - id: di_mucus
    text: Is there mucus in the stool?
    type: yes_no
    group: diarrhoea
    finding: mucus in the stool
  - id: di_nocturnal
    text: Does it wake you from sleep at night?
    type: yes_no
    group: diarrhoea
    finding: nocturnal diarrhoea
  - id: di_relieved_by_defecation
    text: Are the cramps relieved by passing stool?
    type: yes_no
    group: diarrhoea
    finding: cramps relieved by defecation
  - id: di_recent_travel
    text: Any recent travel?
    type: yes_no
    group: diarrhoea
    finding: recent travel
  - id: di_recent_antibiotics
    text: Any recent course of antibiotics?
    type: yes_no
    group: diarrhoea
    finding: recent antibiotics

  # ===================================================================
  # CONSTIPATION
  # ===================================================================
  - id: co_duration
    text: How long have you been constipated?
    type: single_choice
    group: constipation
    semiology: onset
    summary_template: "present for {answer}"
    options:
      - {value: lt_1m, label: Less than a month, hpi: less than a month}
      - {value: 1_6m, label: 1–6 months, hpi: one to six months}
      - {value: gt_6m, label: More than 6 months, hpi: more than six months}
  - id: co_frequency
    text: How often do you pass stool?
    type: single_choice
    group: constipation
    semiology: timing
    summary_template: "passing stool {answer}"
    options:
      - {value: once_daily, label: Once a day, hpi: once daily}
      - {value: alt_days, label: Every 2–3 days, hpi: every 2–3 days}
      - {value: once_3plus_days, label: Less than twice a week, hpi: less than twice a week}
  - id: co_urge
    text: Do you feel the urge to pass stool each day?
    type: yes_no
    group: constipation
    finding: a daily urge to pass stool
  - id: co_timing
    text: When do you usually feel the urge to pass stool? (choose any)
    type: multi_choice
    group: constipation
    semiology: timing
    summary_template: "urge usually {answer}"
    options:
      - {value: morning, label: In the morning, hpi: in the morning}
      - {value: after_meals, label: After meals, hpi: after meals}
      - {value: night, label: At night, hpi: at night}
      - {value: irregular, label: No fixed time, hpi: at no fixed time}
  - id: co_bristol
    # bristol_select: shows the Bristol stool chart; patient picks up to 2 types.
    text: Which stool type(s) best match yours? Choose up to 2.
    type: bristol_select
    group: constipation
    semiology: character
    summary_template: "stool resembling {answer}"
    options:
      - {value: '1', label: "Type 1 — separate hard lumps", hpi: "Bristol type 1 (separate hard lumps)"}
      - {value: '2', label: "Type 2 — lumpy, sausage-like", hpi: "Bristol type 2 (lumpy and sausage-like)"}
      - {value: '3', label: "Type 3 — sausage with cracks", hpi: "Bristol type 3 (cracked sausage)"}
      - {value: '4', label: "Type 4 — smooth, soft sausage", hpi: "Bristol type 4 (smooth and soft)"}
      - {value: '5', label: "Type 5 — soft blobs", hpi: "Bristol type 5 (soft blobs)"}
      - {value: '6', label: "Type 6 — mushy, ragged edges", hpi: "Bristol type 6 (mushy)"}
      - {value: '7', label: "Type 7 — watery, no solids", hpi: "Bristol type 7 (watery)"}
  - id: co_straining
    text: Do you strain or spend a long time trying to pass stool?
    type: yes_no
    group: constipation
    finding: straining
  - id: co_incomplete
    text: Do you feel you haven't fully emptied?
    type: yes_no
    group: constipation
    finding: incomplete evacuation
  - id: co_digitation
    text: Do you use a finger or water jet to pass stool?
    type: yes_no
    group: constipation
    finding: need for digitation
  - id: co_pain_passing
    text: Is it painful to pass stool?
    type: yes_no
    group: constipation
    finding: painful defecation
  - id: co_blood
    text: Is there blood in your stool?
    type: yes_no
    group: constipation
    finding: blood in stool
  - id: co_laxatives
    text: Do you take medicines to pass stool?
    type: yes_no
    group: constipation
    finding: laxative use

