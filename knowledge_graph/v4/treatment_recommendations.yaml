# Per-diagnosis treatment suggestions (right-panel pills). DRAFT — clinician decides;
# not a prescribing protocol.
treatment_recommendations:
  peptic_ulcer_disease: [Proton pump inhibitor, H. pylori eradication if positive, Stop NSAIDs]
  gerd: [Lifestyle and dietary modification, Proton pump inhibitor trial]
  biliary_colic: [Analgesia, Low-fat diet advice, Elective cholecystectomy referral]
  acute_cholecystitis: [Admit; IV fluids, IV antibiotics, Surgical evaluation for cholecystectomy]
  acute_pancreatitis: [Admit; IV fluids, Analgesia and antiemetics, Nil by mouth initially]
  appendicitis: [Surgical referral for appendicectomy, IV fluids and analgesia]
  irritable_bowel_syndrome: [Dietary modification (low-FODMAP), Antispasmodics as needed, Reassurance]
  functional_dyspepsia: [Reassurance and lifestyle advice, Trial of PPI or prokinetic]
  peptic_stricture: [PPI therapy, Endoscopic dilatation referral]
  oesophageal_cancer: [Urgent upper GI / oncology referral, Staging and MDT discussion]
  achalasia: [Gastroenterology referral, Pneumatic dilatation or myotomy]
  eosinophilic_esophagitis: [PPI trial, Dietary / topical steroid per specialist]
  acute_gastroenteritis: [Oral rehydration, Safety-net advice]
  gastritis: [Proton pump inhibitor, Stop NSAIDs/alcohol, H. pylori eradication if positive]
  gastric_outlet_obstruction: [Admit; nasogastric decompression, IV fluids, Endoscopy / surgical referral]
  bowel_obstruction: [Admit; nil by mouth, IV fluids and NG tube, Urgent surgical referral]
  aerophagia: [Reassurance, Reduce fizzy drinks and fast eating, Address stress]
  inflammatory_bowel_disease: [Gastroenterology referral, Anti-inflammatory therapy per specialist]
  coeliac_disease: [Gluten-free diet, Dietitian referral, Correct deficiencies]
  colorectal_cancer: [Urgent colorectal referral, Staging and MDT discussion]
  functional_constipation: [Fibre and fluids, Laxatives as needed, Lifestyle advice]
  hypothyroidism: [Confirm with TFTs, Levothyroxine per endocrinology]
  choledocholithiasis: [Referral for ERCP, Analgesia, Antibiotics if cholangitis]
  viral_hepatitis: [Supportive care, Avoid hepatotoxins/alcohol, Notify and follow up serology]
  alcoholic_hepatitis: [Alcohol cessation and support, Nutritional support, Hepatology referral]
  pancreatic_cancer: [Urgent oncology / HPB referral, Staging and MDT discussion]
  cirrhosis: [Hepatology referral, Treat cause; avoid alcohol, Screen for varices/HCC]
  haemorrhoids: [Fibre and fluids, Topical treatment, Band ligation/surgery if persistent]
  anal_fissure: [Stool softeners and fibre, Topical GTN or diltiazem, Sitz baths]
  perianal_abscess: [Urgent surgical incision and drainage, Analgesia]
  anal_fistula: [Surgical referral (fistulotomy/seton), Treat any underlying cause]
  diverticular_disease: [High-fibre diet, Antibiotics if diverticulitis, Surgical referral if complicated]
  anal_sphincter_dysfunction: [Pelvic floor exercises/biofeedback, Continence advice, Surgical referral if sphincter defect]
  overflow_incontinence: [Disimpaction, Regular laxatives, Bowel retraining]
  functional_bloating: [Dietary modification (low-FODMAP), Reassurance]
  malignant_ascites: [Therapeutic paracentesis, Oncology referral]
  tuberculosis: [Refer for anti-tubercular therapy, Notify and contact tracing]
  congestive_cardiac_failure: [Cardiology referral, Diuretics, Salt and fluid restriction]
  gastric_cancer: [Urgent upper GI / oncology referral, Staging and MDT discussion]
  hyperthyroidism: [Confirm with TFTs, Antithyroid therapy per endocrinology]
  diabetes_mellitus: [Confirm with glucose/HbA1c, Lifestyle and pharmacotherapy per protocol]
  iron_deficiency_anaemia: [Iron supplementation, Investigate the GI source, Treat underlying cause]
  depression: [Screen with PHQ-9, Psychological support, Refer to mental health services]
